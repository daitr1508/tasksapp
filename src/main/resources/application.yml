spring:
  application:
    name: taskmanager
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:taskdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,mappings,configprops,loggers,threaddump,heapdump,tasks
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    info:
      enabled: true
    tasks:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    enabled: true
    export:
      simple:
        enabled: true

info:
  app:
    name: ${app.name}
    version: ${app.version}
    description: Task Management Application
    java-version: ${java.version}

app:
  name: Task manager
  version: 1.0.0
  max-tasks-per-page: 10